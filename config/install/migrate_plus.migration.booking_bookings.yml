id: booking_bookings
label: 'Import Bookings'
migration_group: booking
migration_dependencies:
  required:
    - booking_services
    - booking_agencies
    - booking_users
source:
  plugin: csv
  path: 'modules/custom/booking/migrations/csv/bookings.csv'
  ids:
    - id
process:
  booking_customer_name: customer_name
  booking_customer_email: customer_email
  booking_customer_phone: customer_phone
  booking_date: date
  booking_agency:
    plugin: migration_lookup
    migration: booking_agencies
    source: agency_id
  booking_adviser:
    plugin: migration_lookup
    migration: booking_users
    source: adviser_id
  booking_type:
    plugin: migration_lookup
    migration: booking_services
    source: service_id
  booking_status: status
  booking_notes: notes
destination:
  plugin: 'entity:booking'
