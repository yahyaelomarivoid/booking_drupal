# Client: Booking form
booking.rdv:
  path: "/prendre-un-rdv"
  defaults:
    _form: '\Drupal\booking\Form\BookingSubmitForm'
    _title: "Prendre un rendez-vous"
  requirements:
    _permission: "create booking"

# Client: Booking step
booking.rdv.step:
  path: "/prendre-un-rdv/{step}"
  defaults:
    _form: '\Drupal\booking\Form\BookingSubmitForm'
    _title: "Prendre un rendez-vous"
    step: 1
  requirements:
    _permission: "create booking"
    step: \d+

# Client: Manage booking by reference
booking.mes-rdv:
  path: "/mes-rdv"
  defaults:
    _controller: '\Drupal\booking\Controller\BookingController::manageRendezVous'
    _title: "Mes Rendez-vous"
  options:
    _admin_route: TRUE
  requirements:
    _access: 'TRUE'

# Admin: collection list
entity.booking.collection:
  path: "/admin/structure/booking"
  defaults:
    _entity_list: "booking"
    _title: "Booking List"
  requirements:
    _permission: "access booking overview"

# Admin: canonical/detail view
e
# Admin: full entity edit form
entity.booking.edit_form:
  path: "/admin/structure/booking/{booking}/edit"
  defaults:
    _entity_form: "booking.default"
    _title: "Edit Booking"
  requirements:
    _entity_access: "booking.update"
    booking: \d+

# Admin: status-only form
entity.booking.status_form:
  path: "/admin/structure/booking/{booking}/status"
  defaults:
    _entity_form: "booking.status"
    _title: "Update Booking Status"
  requirements:
    _entity_access: "booking.update"
    booking: \d+

# Admin: delete confirmation form
entity.booking.delete_form:
  path: "/admin/structure/booking/{booking}/delete"
  defaults:
    _entity_form: "booking.delete"
    _title: "Delete Booking"
  requirements:
    _entity_access: "booking.delete"
    booking: \d+

# Admin: export csv data
booking.export:
  path: "/admin/structure/booking/export"
  defaults:
    _controller: '\Drupal\booking\Controller\BookingController::exportData'
    _title: "Export Bookings"
  requirements:
    _permission: "export booking data"
    
# Admin: global settings
booking.settings:
  path: "/admin/config/services/booking"
  defaults:
    _form: '\Drupal\booking\Form\BookingSettingsForm'
    _title: 'Booking Settings'
  requirements:
    _permission: 'administer booking settings'


